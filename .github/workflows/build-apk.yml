
name: Build HTML WebView APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Create Android WebView project from HTML or ZIP
        run: |
          set -euo pipefail

          WORK_DIR="$GITHUB_WORKSPACE"
          EXTRACT_DIR="$GITHUB_WORKSPACE/extracted_zip"
          mkdir -p "$EXTRACT_DIR"

          HTML_FILE=""

          if [ -f "app/src/main/assets/index.html" ]; then
            HTML_FILE="app/src/main/assets/index.html"
          else
            HTML_FILE="$(find "$WORK_DIR" -type f -iname "*.html" -not -path "$WORK_DIR/.git/*" -not -path "$WORK_DIR/.github/*" -not -path "$WORK_DIR/app/*" | head -n 1 || true)"
          fi

          if [ -z "$HTML_FILE" ]; then
            ZIP_FILE="$(find "$WORK_DIR" -type f -iname "*.zip" -not -path "$WORK_DIR/.git/*" -not -path "$WORK_DIR/.github/*" | head -n 1 || true)"
            if [ -n "$ZIP_FILE" ]; then
              unzip -q "$ZIP_FILE" -d "$EXTRACT_DIR"
              HTML_FILE="$(find "$EXTRACT_DIR" -type f -iname "*.html" | head -n 1 || true)"
            fi
          fi

          if [ -z "$HTML_FILE" ]; then
            echo "::error::No HTML file found. Upload your HTML file or ZIP file to the repository root."
            exit 1
          fi

          mkdir -p app/src/main/assets
          TARGET="$GITHUB_WORKSPACE/app/src/main/assets/index.html"
          HTML_REAL="$(realpath "$HTML_FILE")"

          if [ "$HTML_REAL" != "$TARGET" ]; then
            cp "$HTML_FILE" "$TARGET"
          fi

          mkdir -p app/src/main/java/com/mill/troubleshooter

          cat > settings.gradle <<'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }

          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }

          rootProject.name = "MillingTroubleshooter"
          include ":app"
          EOF

          cat > build.gradle <<'EOF'
          plugins {
              id "com.android.application" version "8.5.2" apply false
          }
          EOF

          cat > app/build.gradle <<'EOF'
          plugins {
              id "com.android.application"
          }

          android {
              namespace "com.mill.troubleshooter"
              compileSdk 35

              defaultConfig {
                  applicationId "com.mill.troubleshooter"
                  minSdk 23
                  targetSdk 35
                  versionCode 1
                  versionName "1.0"
              }
          }
          EOF

          cat > app/src/main/AndroidManifest.xml <<'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />

              <application
                  android:allowBackup="true"
                  android:hardwareAccelerated="true"
                  android:label="Milling Troubleshooter"
                  android:theme="@android:style/Theme.Material.Light.NoActionBar"
                  android:usesCleartextTraffic="true">

                  <activity
                      android:name="com.mill.troubleshooter.MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>

              </application>
          </manifest>
          EOF

          cat > app/src/main/java/com/mill/troubleshooter/MainActivity.java <<'EOF'
          package com.mill.troubleshooter;

          import android.app.Activity;
          import android.content.Intent;
          import android.net.Uri;
          import android.os.Bundle;
          import android.webkit.ValueCallback;
          import android.webkit.WebChromeClient;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;

          public class MainActivity extends Activity {
              private static final int FILE_CHOOSER_REQUEST = 1001;
              private WebView webView;
              private ValueCallback<Uri[]> filePathCallback;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);

                  webView = new WebView(this);
                  setContentView(webView);

                  WebSettings settings = webView.getSettings();
                  settings.setJavaScriptEnabled(true);
                  settings.setDomStorageEnabled(true);
                  settings.setDatabaseEnabled(true);
                  settings.setAllowFileAccess(true);
                  settings.setAllowContentAccess(true);
                  settings.setLoadWithOverviewMode(true);
                  settings.setUseWideViewPort(true);

                  webView.setWebViewClient(new WebViewClient());

                  webView.setWebChromeClient(new WebChromeClient() {
                      @Override
                      public boolean onShowFileChooser(
                              WebView webView,
                              ValueCallback<Uri[]> filePathCallback,
                              FileChooserParams fileChooserParams
                      ) {
                          if (MainActivity.this.filePathCallback != null) {
                              MainActivity.this.filePathCallback.onReceiveValue(null);
                          }

                          MainActivity.this.filePathCallback = filePathCallback;

                          Intent intent = fileChooserParams.createIntent();
                          try {
                              startActivityForResult(intent, FILE_CHOOSER_REQUEST);
                          } catch (Exception e) {
                              MainActivity.this.filePathCallback = null;
                              return false;
                          }

                          return true;
                      }
                  });

                  webView.loadUrl("file:///android_asset/index.html");
              }

              @Override
              protected void onActivityResult(int requestCode, int resultCode, Intent data) {
                  super.onActivityResult(requestCode, resultCode, data);

                  if (requestCode == FILE_CHOOSER_REQUEST && filePathCallback != null) {
                      Uri[] results = WebChromeClient.FileChooserParams.parseResult(resultCode, data);
                      filePathCallback.onReceiveValue(results);
                      filePathCallback = null;
                  }
              }

              @Override
              public void onBackPressed() {
                  if (webView != null && webView.canGoBack()) {
                      webView.goBack();
                  } else {
                      super.onBackPressed();
                  }
              }
          }
          EOF

      - name: Build debug APK
        run: |
          gradle assembleDebug --no-daemon

      - name: Prepare APK artifact
        run: |
          mkdir -p output
          cp app/build/outputs/apk/debug/app-debug.apk output/MillingTroubleshooter.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MillingTroubleshooter-debug-apk
          path: output/MillingTroubleshooter.apk
